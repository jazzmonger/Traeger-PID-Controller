# PID values that work really well:
# Pb=55 Ti=180 Td=45 theta=12 tau=300 center=0.0 stable win=25

substitutions:
  fan_cooldown_f: "175.0"
  temp_coarse_threshold_f: "225"
  temp_fine_step_f: "5"
  temp_coarse_step_f: "25"
  temp_min_f: "140"
  firepot_heat_on_c: "148.9"
  firepot_heat_off_c: "162.8"
  firepot_smoke_on_c: "71.1"
  firepot_smoke_off_c: "93.3"
  fan_shutdown_delay_s: "1200"
  pid_cycle_time_s: "15.0"
  p_select_count: "6"

esphome:
  name: 1-traeger-smoker
  friendly_name: 1 Traeger Smoker
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - lambda: id(status_msg).publish_state("Ready");
      - if:
          condition:
            lambda: |-
              return id(rtd_temperature_f).has_state() &&
                     id(rtd_temperature_f).state > ${fan_cooldown_f};
          then:
            - switch.turn_on: fans_on_off_sw
            - lambda: id(status_msg).publish_state("Hot startup - Fans ON");
          else:
            - switch.turn_off: fans_on_off_sw
            - lambda: id(status_msg).publish_state("Ready!");

packages:
  touchscreen: !include common/IPS4.0_touchscreen_(esp32S3_Trager_1pot).yaml
  display_ui: !include common/1Traeger-S3_display.yaml

psram:
  mode: octal
  speed: 80MHz

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: arduino

api:
  reboot_timeout: 24h

logger:
  level: INFO
  logs:
    component: none
    api.connection: ERROR
    max31865: INFO
    max6675: INFO
    ads1115.sensor: ERROR
    sensor: ERROR
    number: ERROR
    ili9xxx: ERROR
    FT63X6: ERROR
    ft63x6: INFO
    spi: ERROR
    touchscreen: ERROR
    I2C: ERROR
    esp-idf: WARN

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

web_server:

spi:
  - id: spi_bus
    clk_pin: GPIO1
    mosi_pin: GPIO2
    miso_pin: GPIO4

display:
  - id: !extend mydisplay
    platform: ili9xxx
    spi_id: spi_bus
    data_rate: 20MHz
    model: ILI9341
    dc_pin: GPIO5
    cs_pin: GPIO7
    reset_pin: GPIO6
    color_palette: 8BIT
    rotation: 0
    invert_colors: true
    show_test_card: false

globals:
  - id: lighting_flag_global
    type: bool
    restore_value: no
    initial_value: 'true'

  - id: fan_manual_override
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: page_number
    type: int
    restore_value: no
    initial_value: '1'

  - id: page_1_selected_option
    type: std::string
    restore_value: no
    initial_value: '"temp_setting"'

select:
  - platform: template
    name: "P Select"
    id: p_select
    options:
      - "P0"
      - "P1"
      - "P2"
      - "P3"
      - "P4"
      - "P5"
    initial_option: "P0"
    restore_value: true
    optimistic: true
    set_action:
      - logger.log:
          format: "Chosen option: %s"
          args: ["x.c_str()"]
    on_value:
      - lambda: |-
          static const int off_times[] = {40, 50, 60, 70, 80, 90};
          if (i >= 0 && i < ${p_select_count}) {
            id(smoke_off_time).publish_state(off_times[i]);
            id(smoke_on_time).publish_state(10);
          }

i2c:
  - id: i2c_bus
    sda: GPIO9
    scl: GPIO40
    scan: true
    timeout: 100ms
    frequency: 50kHz

ads1115:
  address: 0x48
  id: ads1115_48

sensor:
  - platform: template
    name: "Firepot Monitor"
    id: firepot_monitor
    internal: true
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      if (!id(go).state || !id(firepot_temperature).has_state()) {
        return 0.0;
      }
      float fp = id(firepot_temperature).state;
      if (!id(smoke_mode).state) {
        if (fp < ${firepot_heat_on_c}) return 1.0;
        if (fp > ${firepot_heat_off_c}) return 0.0;
      } else {
        if (fp < ${firepot_smoke_on_c}) return 1.0;
        if (fp > ${firepot_smoke_off_c}) return 0.0;
      }
      return 0.0;

  - platform: max6675
    name: "FirePot Temperature"
    id: firepot_temperature
    cs_pin: GPIO15
    update_interval: 5s

  - platform: max31865
    id: rtd_temperature_c
    cs_pin: GPIO17
    spi_id: spi_bus
    reference_resistance: "4280 Ω"
    rtd_nominal_resistance: "1000 Ω"
    data_rate: 4MHz
    update_interval: 1s
    rtd_wires: 2
    filters:
      - filter_out: NaN

  - platform: template
    name: "RTD Temperature"
    id: rtd_temperature_f
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (id(rtd_temperature_c).has_state()) {
        return id(rtd_temperature_c).state * 1.8 + 32.0;
      }
      return {};
    filters:
      - offset: +6

  - platform: template
    name: "A1 Thermistor Resistance"
    unit_of_measurement: "Ω"
    update_interval: never
    id: a1_thermistor_resistance
    internal: true
    entity_category: diagnostic

  - platform: template
    name: "A1 Temperature"
    id: a1_temperature
    unit_of_measurement: "°F"
    accuracy_decimals: 2
    update_interval: never

  - platform: ads1115
    multiplexer: 'A1_GND'
    name: "A1 ADS1115 to GND"
    ads1115_id: ads1115_48
    id: a1_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 4
    update_interval: 2s
    gain: 6.144
    filters:
      median:
        window_size: 7
        send_every: 1
    on_value:
      then:
        - lambda: |-
            const float Vcc = 5.1;
            const float R_1 = 148600;
            float Vout = id(a1_voltage).state;
            float R_thermistor = 0;

            if (Vout > 0) {
              R_thermistor = (Vout * R_1) / (Vcc - Vout);
            }

            float temperature = 0;
            if (R_thermistor > 0) {
              const float A = .00086732282163;
              const float B = .00019645922453;
              const float C = .0000001484424132;

              float lnR = log(R_thermistor);
              float T_kelvin = 1.0 / (A + B * lnR + C * lnR * lnR * lnR);
              float T_celsius = T_kelvin - 273.15;
              temperature = (T_celsius * 9.0 / 5.0) + 32.0;
            }

            id(a1_thermistor_resistance).publish_state(R_thermistor);
            id(a1_temperature).publish_state(temperature);

  - platform: rotary_encoder
    name: "Rotary Encoder"
    pin_a:
      number: GPIO18
      inverted: true
    pin_b:
      number: GPIO8
      inverted: false
    id: rotary
    on_clockwise:
      - script.execute:
          id: sc_adjust_setpoint
          direction: 1
          use_fine_coarse: true
    on_anticlockwise:
      - script.execute:
          id: sc_adjust_setpoint
          direction: -1
          use_fine_coarse: true

button:
  - platform: restart
    id: restart_esp
    name: "Controller Restart"
  - platform: factory_reset
    name: Restart with Factory Default Settings
    internal: true
  - platform: template
    name: "Emergency Stop"
    id: sc_stop_all_button
    on_press:
      - script.execute: sc_stop_all

text_sensor:
  - platform: template
    id: status_msg
    name: "Status Message"

  - platform: template
    id: status_msg_saved_page_1
    internal: true

switch:
  - platform: template
    optimistic: true
    name: "System ON/OFF"
    id: go
    on_turn_on:
      - logger.log: "System turned ON"
      - globals.set:
          id: lighting_flag_global
          value: 'true'
      - globals.set:
          id: fan_manual_override
          value: 'false'
      - logger.log: "turning ON fan"
      - switch.turn_on: fans_on_off_sw
      - script.execute: sc_light_pot

    on_turn_off:
      - logger.log: "System turned OFF"
      - switch.turn_off: smoke_mode
      - switch.turn_off: hotrod_1_sw
      - switch.turn_off: auger_1_sw
      - script.execute: sc_stop_all
      - lambda: id(status_msg).publish_state("Turned OFF");
      - if:
          condition:
            lambda: |-
              return id(rtd_temperature_f).has_state() &&
                     id(rtd_temperature_f).state > ${fan_cooldown_f};
          then:
            - globals.set:
                id: fan_manual_override
                value: 'false'
            - script.execute: sc_shutdown
            - lambda: id(status_msg).publish_state("Cooling down - Fans ON");
          else:
            - switch.turn_off: fans_on_off_sw

  - platform: template
    optimistic: true
    name: "Smoking Mode ON/OFF"
    id: smoke_mode
    on_turn_on:
      - if:
          condition:
            switch.is_on: go
          then:
            - switch.turn_off: hotrod_1_sw
            - script.stop: sc_light_pot
            - logger.log: "Smoke Mode turned ON"
            - lambda: id(status_msg).publish_state("Smoking Mode");
            - script.stop: sc_pot_heating
            - script.execute: sc_pot_smoking
            - switch.turn_on: fans_on_off_sw
    on_turn_off:
      - if:
          condition:
            switch.is_on: go
          then:
            - logger.log: "sw.Heating Mode"
            - lambda: id(status_msg).publish_state("Heating Mode");
            - script.stop: sc_pot_smoking
            - script.execute: sc_pot_heating

  - platform: gpio
    pin: GPIO11
    name: "Fans On/Off"
    inverted: no
    id: fans_on_off_sw
    internal: true
    on_turn_on:
      - lambda: |-
          id(fan_manual_override) = false;
          ESP_LOGD("Fans ON", "RTD Temp: %.3f", id(rtd_temperature_f).state);
    on_turn_off:
      - lambda: |-
          id(fan_manual_override) = true;
          ESP_LOGD("Fans OFF", "RTD Temp: %.3f (manual override)", id(rtd_temperature_f).state);
          if (id(rtd_temperature_f).has_state() &&
              id(rtd_temperature_f).state > ${fan_cooldown_f}) {
            id(status_msg).publish_state("Fan off - grill still hot");
          }

  - platform: gpio
    pin: GPIO12
    name: "Auger 1 SW"
    inverted: no
    id: auger_1_sw
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO13
    name: "HotRod 1 SW"
    inverted: no
    id: hotrod_1_sw
    internal: true
    restore_mode: ALWAYS_OFF

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO10
      mode:
        input: true
    name: "Power Button"
    filters:
      - invert:
      - delayed_on_off: 50ms
    on_press:
      - switch.toggle: go
      - logger.log: "Power button pressed - toggling system"

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
    name: "Smoke Mode Button"
    filters:
      - invert:
      - delayed_on_off: 50ms
    on_press:
      - switch.toggle: smoke_mode
      - logger.log: "Smoke mode button pressed - toggling smoke mode"

  - platform: gpio
    pin:
      number: GPIO38
      mode:
        input: true
    name: "Temperature Down"
    filters:
      - invert:
      - delayed_on_off: 50ms
    on_press:
      - script.execute:
          id: sc_adjust_setpoint
          direction: -1
          use_fine_coarse: false

  - platform: gpio
    pin:
      number: GPIO45
      mode:
        input: true
    name: "Temperature Up"
    filters:
      - invert:
      - delayed_on_off: 50ms
    on_press:
      - script.execute:
          id: sc_adjust_setpoint
          direction: 1
          use_fine_coarse: false

  - platform: touchscreen
    id: touch_key_POWER
    x_min: 1
    x_max: 95
    y_min: 1
    y_max: 80
    on_press:
      - logger.log: "POWER was touched"
      - switch.toggle: go

  - platform: touchscreen
    id: touch_key_SMOKE
    x_min: 96
    x_max: 230
    y_min: 1
    y_max: 80
    on_press:
      - logger.log: "SMOKE was touched"
      - switch.toggle: smoke_mode

  - platform: touchscreen
    id: touch_key_HOTROD_1
    x_min: 192
    x_max: 230
    y_min: 242
    y_max: 280
    on_press:
      - logger.log: "HotRod was touched"
      - switch.toggle: hotrod_1_sw

  - platform: gpio
    pin:
      number: GPIO3
      mode:
        input: true
        pullup: true
    name: "Rotary Switch"
    id: rotary_switch
    filters:
      invert:
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.5s
        then:
          - logger.log: "Single Click - Toggling adjustment selection"
          - lambda: |-
              if (id(page_1_selected_option) == "temp_setting") {
                id(status_msg).publish_state("     Adjusting P Level");
                id(page_1_selected_option) = "p_setting";
              } else {
                id(status_msg).publish_state("     Adjusting Temp");
                id(page_1_selected_option) = "temp_setting";
              }

      - timing:
          - ON for at least 1s
        then:
          - logger.log: "Rotary Switch Long Pressed Toggling Display Page"
          - lambda: |-
              if (id(page_number) == 1) {
                id(status_msg_saved_page_1).publish_state(id(status_msg).state);
                id(page_number) = 2;
                id(status_msg).publish_state("  ");
              } else {
                id(page_number) = 1;
                id(status_msg).publish_state(id(status_msg_saved_page_1).state);
              }

      - timing:
          - ON for at most 1s
          - OFF for at most 1s
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - logger.log: "Double Click Detected"

  - platform: template
    id: lighting_flag
    name: "Lighting Flag"
    internal: true
    entity_category: diagnostic
    lambda: 'return id(lighting_flag_global);'

number:
  - platform: template
    name: "PID Proportional Band"
    id: pid_pb
    optimistic: true
    min_value: 10
    max_value: 200
    step: 1
    restore_value: true
    initial_value: 55.0
    internal: true
    entity_category: config
    mode: box
    icon: mdi:tune-vertical

  - platform: template
    name: "PID Ti (Reset Time)"
    id: pid_ti
    optimistic: true
    min_value: 0
    max_value: 600
    step: 1
    restore_value: true
    initial_value: 180.0
    internal: true
    entity_category: config
    mode: box
    icon: mdi:timer-sync

  - platform: template
    name: "PID Td (Rate Time)"
    id: pid_td
    optimistic: true
    min_value: 0
    max_value: 120
    step: 1
    restore_value: true
    initial_value: 45.0
    internal: true
    entity_category: config
    mode: box
    icon: mdi:timer-outline

  - platform: template
    name: "PID Tau"
    id: pid_tau
    min_value: 0
    max_value: 600
    step: 1
    initial_value: 300
    optimistic: true
    restore_value: true
    internal: true
    entity_category: config
    unit_of_measurement: "s"

  - platform: template
    name: "PID Theta"
    id: pid_theta
    min_value: 0
    max_value: 120
    step: 1
    initial_value: 12
    optimistic: true
    restore_value: true
    internal: true
    entity_category: config
    unit_of_measurement: "s"
    mode: box
    icon: mdi:tune-vertical

  - platform: template
    name: "PID Center Factor"
    id: pid_center_factor
    min_value: 0.0
    max_value: 1.0
    step: 0.0001
    initial_value: 0.0
    optimistic: true
    restore_value: true
    internal: true
    entity_category: config
    mode: box
    icon: mdi:tune-vertical

  - platform: template
    name: "PID Stable Window"
    id: pid_stable_window
    min_value: 0
    max_value: 50
    step: 1
    initial_value: 25
    optimistic: true
    restore_value: true
    internal: true
    entity_category: config
    unit_of_measurement: "°F"
    mode: box
    icon: mdi:tune-vertical

  - platform: template
    name: "Smoke Auger On Time"
    id: smoke_on_time
    restore_value: yes
    min_value: 5
    max_value: 20
    step: 1
    initial_value: 10
    optimistic: true
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "Smoke Auger Off Time (P val)"
    id: smoke_off_time
    restore_value: yes
    min_value: 5
    max_value: 90
    step: 1
    initial_value: 40
    optimistic: true
    unit_of_measurement: "s"
    mode: box

  - platform: template
    name: "PID Error Temp"
    id: pid_error
    min_value: 0
    max_value: 600
    step: 1
    initial_value: 100
    optimistic: true
    restore_value: false
    internal: true
    entity_category: diagnostic
    unit_of_measurement: "°F"

  - platform: template
    name: Smoker Set Temperature
    id: smoker_set_temp
    min_value: 140
    max_value: 550
    step: 5
    initial_value: 225
    optimistic: true
    restore_value: true
    unit_of_measurement: "°F"
    mode: slider

  - platform: template
    name: Pot lighting ON Time
    id: pot_lighting_on_time
    min_value: 1
    max_value: 120
    step: 1
    initial_value: 60
    optimistic: true
    restore_value: false
    unit_of_measurement: "s"
    mode: slider
    icon: mdi:timer-settings

  - platform: template
    name: Pot lighting OFF Time
    id: pot_lighting_off_time
    min_value: 1
    max_value: 360
    step: 1
    initial_value: 600
    optimistic: true
    restore_value: false
    unit_of_measurement: "s"
    mode: slider
    icon: mdi:timer-settings

  - platform: template
    name: Augers Heating ON Time
    id: augers_heating_on_time
    min_value: 3
    max_value: 20
    step: 0.5
    initial_value: 15
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    mode: slider
    icon: mdi:timer-settings

  - platform: template
    name: Augers Heating OFF Time
    id: augers_heating_off_time
    min_value: 0
    max_value: 20
    step: 0.5
    initial_value: 1
    optimistic: true
    restore_value: true
    unit_of_measurement: "s"
    mode: slider
    icon: mdi:timer-settings-outline

  - platform: template
    name: "Smoke Cycle Delay"
    id: smoke_cycle_delay
    min_value: 30
    max_value: 90
    step: 5
    initial_value: 45
    optimistic: true
    restore_value: true
    internal: true
    entity_category: config
    unit_of_measurement: "s"
    mode: slider
    icon: mdi:timer-sync

script:
  - id: sc_adjust_setpoint
    mode: queued
    parameters:
      direction: int
      use_fine_coarse: bool
    then:
      - if:
          condition:
            lambda: 'return id(page_1_selected_option) == "temp_setting";'
          then:
            - lambda: |-
                float current_temp = id(smoker_set_temp).state;
                float step;
                if (current_temp <= ${temp_coarse_threshold_f}) {
                  step = ${temp_fine_step_f};
                } else if (use_fine_coarse && id(rotary_switch).state) {
                  step = ${temp_fine_step_f};
                } else {
                  step = ${temp_coarse_step_f};
                }
                float new_temp = current_temp + (direction * step);
                if (current_temp <= ${temp_coarse_threshold_f}) {
                  new_temp = round(new_temp / ${temp_fine_step_f}) * ${temp_fine_step_f};
                } else {
                  new_temp = round(new_temp / ${temp_coarse_step_f}) * ${temp_coarse_step_f};
                }
                if (new_temp >= ${temp_min_f} &&
                    new_temp <= id(smoker_set_temp).traits.get_max_value()) {
                  id(smoker_set_temp).publish_state(new_temp);
                }
          else:
            - script.execute:
                id: sc_adjust_p_select
                direction: !lambda 'return direction;'

  - id: sc_adjust_p_select
    mode: queued
    parameters:
      direction: int
    then:
      - lambda: |-
          auto current_index = id(p_select).index_of(id(p_select).state);
          if (!current_index.has_value()) {
            return;
          }
          int next_index = current_index.value() + direction;
          if (next_index < 0) {
            next_index += ${p_select_count};
          } else {
            next_index %= ${p_select_count};
          }
          id(p_select).make_call().set_index(next_index).perform();

  - id: sc_firepot_monitor
    mode: single
    then:
      - if:
          condition:
            switch.is_on: go
          then:
            - if:
                condition:
                  lambda: 'return !id(lighting_flag_global);'
                then:
                  - if:
                      condition:
                        lambda: |-
                          if (!id(firepot_temperature).has_state()) return false;
                          float fp = id(firepot_temperature).state;
                          if (!id(smoke_mode).state) {
                            return fp < ${firepot_heat_on_c};
                          }
                          return fp < ${firepot_smoke_on_c};
                      then:
                        - if:
                            condition:
                              switch.is_off: hotrod_1_sw
                            then:
                              - switch.turn_on: hotrod_1_sw
                              - logger.log: "Firepot: hotrod ON (flame recovery)"
                      else:
                        - if:
                            condition:
                              lambda: |-
                                if (!id(firepot_temperature).has_state()) return false;
                                float fp = id(firepot_temperature).state;
                                if (!id(smoke_mode).state) {
                                  return fp > ${firepot_heat_off_c};
                                }
                                return fp > ${firepot_smoke_off_c};
                            then:
                              - if:
                                  condition:
                                    switch.is_on: hotrod_1_sw
                                  then:
                                    - switch.turn_off: hotrod_1_sw
                                    - logger.log: "Firepot: hotrod OFF"

  - id: sc_light_pot
    mode: single
    then:
      - logger.log: "sc_light_pot executing"
      - if:
          condition:
            switch.is_on: go
          then:
            - delay: 0.01s
            - lambda: id(status_msg).publish_state("Lighting Fire Pot");
            - switch.turn_on: hotrod_1_sw
            - switch.turn_on: auger_1_sw
            - delay: !lambda 'return (uint32_t)(id(pot_lighting_on_time).state * 1000);'
            - switch.turn_off: auger_1_sw
            - repeat:
                count: 3
                then:
                  - logger.log:
                      format: "Keeping pot lit. Lighting Cycle counter = %d"
                      args: ['iteration + 1']
                  - delay: 30s
                  - switch.turn_on: auger_1_sw
                  - delay: 30s
                  - switch.turn_off: auger_1_sw
            - lambda: id(lighting_flag).publish_state(false);
            - globals.set:
                id: lighting_flag_global
                value: 'false'
            - lambda: id(status_msg).publish_state("Pot Lit");
            - delay: 2s
            - lambda: id(status_msg).publish_state("Heating Mode");
            - script.execute: sc_pot_heating
            - delay: 300s
            - switch.turn_off: hotrod_1_sw

  - id: sc_pot_heating
    mode: restart
    then:
      - logger.log: "sc_pot_heating.STARTING"
      - while:
          condition:
            switch.is_on: go
          then:
            - logger.log:
                format: "Heating cycle: ON time=%.1fs, OFF time=%.1fs"
                args: ["id(augers_heating_on_time).state", "id(augers_heating_off_time).state"]
            - switch.turn_on: auger_1_sw
            - delay: !lambda "return id(augers_heating_on_time).state * 1000;"
            - switch.turn_off: auger_1_sw
            - delay: !lambda "return id(augers_heating_off_time).state * 1000;"

  - id: sc_pot_smoking
    mode: restart
    then:
      - while:
          condition:
            switch.is_on: go
          then:
            - logger.log:
                format: "Smoke settings - On time: %.1fs, Off time: %.1fs"
                args: ['id(smoke_on_time).state', 'id(smoke_off_time).state']
            - switch.turn_on: auger_1_sw
            - delay: !lambda "return id(smoke_on_time).state * 1000;"
            - switch.turn_off: auger_1_sw
            - delay: !lambda "return id(smoke_off_time).state * 1000;"

  - id: sc_stop_all
    mode: single
    then:
      - logger.log: "sc_stop_all"
      - lambda: id(status_msg).publish_state("Stopping...");
      - script.stop: sc_light_pot
      - script.stop: sc_pot_smoking
      - script.stop: sc_pot_heating
      - switch.turn_off: hotrod_1_sw
      - switch.turn_off: auger_1_sw

  - id: sc_shutdown
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !id(fan_manual_override);'
          then:
            - switch.turn_on: fans_on_off_sw
      - delay: !lambda 'return ${fan_shutdown_delay_s} * 1000;'
      - if:
          condition:
            lambda: |-
              if (!id(rtd_temperature_f).has_state()) return false;
              return id(rtd_temperature_f).state > ${fan_cooldown_f};
          then:
            - logger.log: "Smoker is still hot, keeping cooldown fans on"
            - if:
                condition:
                  lambda: 'return !id(fan_manual_override);'
                then:
                  - switch.turn_on: fans_on_off_sw
          else:
            - logger.log: "Smoker is now cool, turning off fans"
            - switch.turn_off: fans_on_off_sw
            - script.stop: sc_shutdown

interval:
  - interval: 5s
    then:
      - if:
          condition:
            and:
              - switch.is_on: go
              - switch.is_off: smoke_mode
          then:
            - lambda: |-
                const float cycle_time = ${pid_cycle_time_s};
                const float min_multiplier = 0.02;
                const float max_multiplier = 0.999;
                const float max_output = 0.95f;

                static float last_temp = 0.0;
                static unsigned long last_time = 0;
                static float integral = 0.0;
                static float last_error = 0.0;
                static float set_point = 0.0;
                static unsigned long last_set_time = 0;
                static float start_change_temp = 0.0;
                static bool new_target = false;

                unsigned long current_time = millis();

                if (last_time == 0) {
                  last_time = current_time;
                  return;
                }

                float dt = (current_time - last_time) / 1000.0;
                if (dt < 0.001) {
                  last_time = current_time;
                  return;
                }

                if (!id(rtd_temperature_f).has_state()) {
                  return;
                }

                float current_temp = id(rtd_temperature_f).state;
                float pb = id(pid_pb).state;
                float ti = id(pid_ti).state;
                float td = id(pid_td).state;
                float tau = id(pid_tau).state;
                float theta = id(pid_theta).state;
                float center_factor = id(pid_center_factor).state;

                float new_set_point = id(smoker_set_temp).state;
                if (new_set_point != set_point) {
                  set_point = new_set_point;
                  last_error = 0.0;
                  integral = 0.0;
                  last_time = current_time;
                  last_set_time = current_time;
                  start_change_temp = current_temp;
                  new_target = true;
                }

                float kp = (pb != 0.0) ? 1.0 / pb : 0.0;
                float ki = (ti != 0.0) ? kp / ti : 0.0;
                float kd = kp * td;
                float center = set_point * center_factor;

                float roc = (current_temp - last_temp) / dt;
                float predicted_temp = current_temp + (roc * theta) * (1 - exp(-dt / tau));
                float predicted_error = set_point - predicted_temp;
                float error = set_point - current_temp;

                float p = kp * predicted_error + center;
                float integral_max = (ki != 0.0f) ? std::max(10000.0f, std::abs(center / ki)) : 10000.0f;
                integral += predicted_error * dt;
                integral = std::max(std::min(integral, integral_max), -integral_max);
                float i = ki * integral;

                float derv = (error - last_error) / dt;
                if (dt <= 0) derv = 0.0;
                float d = kd * derv;

                float u = p + i + d;

                if (predicted_error < -150.0) {
                  u = std::min(1.0f, u - 0.3f);
                } else if (predicted_error > 150.0) {
                  u = std::max(0.0f, u + 0.3f);
                }

                if (new_target && abs(error) <= 5.0) {
                  new_target = false;
                }
                if (new_target && current_time - last_set_time >= cycle_time * 3 &&
                    abs(error) <= abs(start_change_temp - set_point) / 2) {
                  integral = 0.0;
                }
                if ((new_target && set_point < current_temp) || abs(error) > pb * 2) {
                  derv = 0.0;
                  d = 0.0;
                }
                if (error < pb / 2 && error > 0 && current_time - last_set_time < cycle_time * 3) {
                  u *= 0.9;
                }

                float u_clamped = std::max(0.05f, std::min(max_output, u));
                if (ki != 0.0) {
                  integral += (u_clamped - u) / ki;
                  integral = std::max(std::min(integral, integral_max), -integral_max);
                }
                u = u_clamped;

                float new_on_time = u * cycle_time;
                float new_off_time = (1.0 - u) * cycle_time;

                float min_time = cycle_time * min_multiplier;
                float max_time = cycle_time * max_multiplier;
                new_on_time = std::max(min_time, std::min(max_time, new_on_time));
                new_off_time = std::max(min_time, std::min(max_time, new_off_time));

                id(pid_error).publish_state(error);
                id(augers_heating_on_time).publish_state(new_on_time);
                id(augers_heating_off_time).publish_state(new_off_time);

                last_temp = current_temp;
                last_time = current_time;
                last_error = error;

                ESP_LOGD("PID", "SetPoint: %.1f RTD: %.1f On: %.1fs Off: %.1fs",
                         set_point, current_temp, new_on_time, new_off_time);

  - interval: 10s
    then:
      - script.execute: sc_firepot_monitor

  - interval: 30s
    then:
      - if:
          condition:
            and:
              - switch.is_off: go
              - lambda: 'return !id(fan_manual_override);'
              - lambda: |-
                  return id(rtd_temperature_f).has_state() &&
                         id(rtd_temperature_f).state > ${fan_cooldown_f};
          then:
            - if:
                condition:
                  switch.is_off: fans_on_off_sw
                then:
                  - switch.turn_on: fans_on_off_sw
                  - script.execute: sc_shutdown
